name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            libclang-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release -p seveny-node

      - name: Build WASM runtime
        run: cargo build --release -p seveny-runtime

      - name: Create checksums
        run: |
          cd target/release
          sha256sum seveny-node > seveny-node.sha256
          if [ -f wbuild/seveny-runtime/seveny_runtime.compact.compressed.wasm ]; then
            sha256sum wbuild/seveny-runtime/seveny_runtime.compact.compressed.wasm > seveny-runtime.wasm.sha256
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            target/release/seveny-node
            target/release/seveny-node.sha256
            target/release/wbuild/seveny-runtime/seveny_runtime.compact.compressed.wasm
            target/release/seveny-runtime.wasm.sha256
          retention-days: 30
          if-no-files-found: warn

  srtool:
    name: Deterministic WASM (srtool)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runtime with srtool
        id: srtool_build
        uses: chevdor/srtool-actions@v0.9.2
        with:
          chain: seveny
          package: seveny-runtime
          runtime_dir: runtime

      - name: Summary
        run: |
          echo "## srtool Build" >> $GITHUB_STEP_SUMMARY
          echo "- **WASM hash**: ${{ steps.srtool_build.outputs.wasm_hash }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Compact hash**: ${{ steps.srtool_build.outputs.wasm_compressed_hash }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Proposal hash**: ${{ steps.srtool_build.outputs.proposal_hash }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload srtool artifacts
        uses: actions/upload-artifact@v4
        with:
          name: srtool-artifacts
          path: |
            ${{ steps.srtool_build.outputs.wasm }}
            ${{ steps.srtool_build.outputs.wasm_compressed }}
          retention-days: 90
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, srtool]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: ./release

      - name: Download srtool artifacts
        uses: actions/download-artifact@v4
        with:
          name: srtool-artifacts
          path: ./srtool
        continue-on-error: true

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > changelog.md
            echo "" >> changelog.md
            git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD >> changelog.md
          else
            echo "## Initial release" > changelog.md
          fi
          echo "" >> changelog.md
          echo "## Runtime" >> changelog.md
          SPEC=$(grep -oP 'spec_version:\s*\K\d+' runtime/src/lib.rs || echo "unknown")
          echo "- spec_version: ${SPEC}" >> changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**
            srtool/**
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./devnet/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
