name: Benchmarks

on:
  pull_request:
    paths:
      - 'pallets/**'
      - 'runtime/**'
      - 'primitives/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            libclang-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: bench

      - name: Build with benchmarks
        run: cargo build --release --features runtime-benchmarks -p seveny-node

      - name: Run benchmarks
        run: |
          mkdir -p benchmark-output
          ./target/release/seveny-node benchmark pallet \
            --chain dev \
            --pallet "*" \
            --extrinsic "*" \
            --steps 20 \
            --repeat 10 \
            --output benchmark-output/ \
            --json-file benchmark-output/results.json || true
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-weights
          path: benchmark-output/
          retention-days: 90
          if-no-files-found: ignore

  comment:
    name: Post Benchmark Summary
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-weights
          path: benchmark-output
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "## Benchmark Results" > benchmark-comment.md
          echo "" >> benchmark-comment.md
          if [ -f benchmark-output/results.json ]; then
            echo "<details><summary>Weight summary</summary>" >> benchmark-comment.md
            echo "" >> benchmark-comment.md
            echo '```' >> benchmark-comment.md
            cat benchmark-output/results.json | jq -r \
              '.[] | "\(.pallet)::\(.benchmark): \(.average_weight) ps"' \
              2>/dev/null | head -50 >> benchmark-comment.md \
              || echo "Could not parse results" >> benchmark-comment.md
            echo '```' >> benchmark-comment.md
            echo "</details>" >> benchmark-comment.md
          else
            echo "Benchmark results not available for this run." >> benchmark-comment.md
          fi

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: benchmark-comment.md
          header: benchmarks
