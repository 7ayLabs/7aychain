# cargo-deny v2 configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
# Transitive Substrate deps — no fix available upstream
ignore = [
    "RUSTSEC-2026-0007", # bytes: integer overflow in BytesMut::reserve
    "RUSTSEC-2025-0009", # ring: AES panic with overflow checks
    "RUSTSEC-2026-0009", # time: DoS via stack exhaustion
    "RUSTSEC-2026-0006", # wasmtime: f64.copysign segfault on x86-64
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Zlib",
    "Unlicense",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MIT-0",
    "0BSD",
    "MPL-2.0",
    "BUSL-1.1",
    "OpenSSL",
    "GPL-3.0-or-later WITH Classpath-exception-2.0",
]
confidence-threshold = 0.8
exceptions = [
    { allow = ["GPL-3.0"], crate = "chain-spec-builder" },
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
